  <circle cx="110" cy="240" r="22" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5" style="fill:rgb(238, 237, 254);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="190" cy="330" r="22" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5" style="fill:rgb(238, 237, 254);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

