    <circle cx="330" cy="220" r="26" fill="#FAECE7" stroke="#D85A30" stroke-width="2" style="fill:rgb(250, 236, 231);stroke:rgb(216, 90, 48);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="320" y1="210" x2="340" y2="230" stroke="#D85A30" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(216, 90, 48);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="210" x2="320" y2="230" stroke="#D85A30" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(216, 90, 48);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- ─── GAB WORDMARK ─── -->
  <text x="490" y="175" text-anchor="middle" font-family="var(--font-sans)" font-size="96" font-weight="500" fill="#534AB7" opacity="0.95" letter-spacing="-4" style="fill:rgb(83, 74, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:96px;font-weight:500;text-anchor:middle;dominant-baseline:auto">GAB</text>
  <rect x="420" y="190" width="142" height="4" rx="2" fill="#D85A30" opacity="0.85" style="fill:rgb(216, 90, 48);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="491" y="222" text-anchor="middle" font-family="var(--font-sans)" fill="#7F77DD" font-size="12" letter-spacing="1.5" style="fill:rgb(127, 119, 221);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">ADVERSARIAL GRAPH BENCHMARK</text>
  <text x="491" y="252" text-anchor="middle" font-family="var(--font-sans)" fill="#888780" font-size="11" style="fill:rgb(136, 135, 128);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Practical · Fair · Rigorous</text>

